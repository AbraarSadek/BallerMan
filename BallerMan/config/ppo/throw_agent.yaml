behaviors:
  ThrowAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3        # Entropy coefficient — keeps exploration alive early on
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true     # Critical: observations span very different scales
      hidden_units: 256
      num_layers: 3       # Extra layer for jump + release timing coordination
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 8000000    # More steps: agent must learn to time jump AND arm AND release together
    time_horizon: 128     # Longer horizon: jump arc takes more steps than a standing throw
    summary_freq: 10000
    keep_checkpoints: 5
    checkpoint_interval: 100000
